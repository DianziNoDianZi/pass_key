; PlatformIO 项目配置文件
; 构建系统：PlatformIO
; 目标板：ESP32-S3-DevKitC-1
; 框架：Arduino

[env:esp32-s3-dev]
platform      = espressif32
board         = esp32-s3-devkitc-1
framework     = arduino
monitor_speed = 115200

; 分区方案：使用默认的 4MB 分区
board_build.partitions = default_16MB.csv

; 编译选项
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; 库依赖
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    ; mbedtls 已包含在 ESP32 Arduino 核心中，无需额外添加
    ; PubSubClient 已移除 — 使用 Air780ep 原生 MQTT AT 命令 (+QMTOPEN/+QMTCONN/+QMTSUB/+QMTPUB)

; TFT_eSPI 使用 User_Setup.h 进行配置
; 在 firmware 目录下放置 User_Setup.h 供 TFT_eSPI 自动加载
