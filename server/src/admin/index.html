<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassKey 管理面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; color: #333; }
/* Login */
.login-screen { position: fixed; top:0; left:0; right:0; bottom:0; background:#1a1a2e; display:flex; align-items:center; justify-content:center; z-index:9999; }
.login-box { background:#fff; border-radius:16px; padding:40px; width:90%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center; }
.login-box h1 { font-size:24px; margin-bottom:4px; }
.login-box h1 span { color:#4fc3f7; }
.login-box p { color:#888; font-size:14px; margin-bottom:24px; }
.login-box input { width:100%; padding:12px 16px; border:1px solid #ddd; border-radius:10px; font-size:16px; outline:none; text-align:center; transition:0.2s; }
.login-box input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.login-box .btn { width:100%; margin-top:12px; padding:12px; }
.login-box .error { color:#ef4444; font-size:13px; margin-top:8px; display:none; }
/* Nav */
.nav { background: #1a1a2e; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 32px; }
.nav h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
.nav h1 span { color: #4fc3f7; }
.nav a { color: #99a; text-decoration: none; font-size: 14px; padding: 18px 0; border-bottom: 2px solid transparent; transition: 0.2s; cursor:pointer; }
.nav a:hover, .nav a.active { color: #fff; border-bottom-color: #4fc3f7; }
.nav .logout { margin-left:auto; color:#99a; font-size:13px; cursor:pointer; padding:18px 0; }
.nav .logout:hover { color:#ef4444; }
/* Layout */
.container { max-width: 1100px; margin: 0 auto; padding: 24px; display:none; }
.container.show { display:block; }
/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-card .label { font-size: 13px; color: #888; margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .value.online { color: #22c55e; }
.stat-card .value.offline { color: #ef4444; }
/* Section */
.section { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 24px; overflow: hidden; }
.section-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.section-header h2 { font-size: 16px; font-weight: 600; }
/* Table */
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 12px 20px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
th { font-weight: 600; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; background: #fafafa; }
tr:hover td { background: #f8f9ff; }
td .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge.pending { background: #fff3cd; color: #856404; }
.badge.approved { background: #d4edda; color: #155724; }
.badge.denied { background: #f8d7da; color: #721c24; }
.badge.timeout { background: #e2e3e5; color: #383d41; }
/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-weight: 500; transition: 0.2s; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
/* Modal */
.modal-overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,.4); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:16px; padding:24px; width:90%; max-width:480px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
.modal h3 { font-size:18px; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; color:#666; margin-bottom:4px; font-weight:500; }
.form-group input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; outline:none; transition:.2s; }
.form-group input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
/* Tab pages */
.page { display:none; }
.page.active { display:block; }
/* Status indicators */
.status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.status-dot.green { background:#22c55e; }
.status-dot.gray { background:#9ca3af; }
/* Toast */
.toast { position:fixed; bottom:24px; right:24px; background:#1a1a2e; color:#fff; padding:12px 20px; border-radius:10px; font-size:14px; box-shadow:0 4px 12px rgba(0,0,0,.2); z-index:2000; opacity:0; transform:translateY(10px); transition:.3s; }
.toast.show { opacity:1; transform:translateY(0); }
/* Empty state */
.empty { text-align:center; padding:48px 20px; color:#999; font-size:14px; }
.empty .icon { font-size:40px; margin-bottom:8px; }
/* Responsive */
@media (max-width:640px) { .nav { padding:0 16px; gap:16px; } .container { padding:16px; } th,td { padding:10px 12px; } }
</style>
</head>
<body>

<!-- ===== 登录页 ===== -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>Pass<span>Key</span></h1>
    <p>请输入管理密码</p>
    <input type="password" id="login-password" placeholder="管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
    <div class="error" id="login-error">密码错误</div>
  </div>
</div>

<!-- ===== 导航 ===== -->
<nav class="nav" id="nav-bar" style="display:none;">
  <h1>Pass<span>Key</span></h1>
  <a data-page="dashboard" class="active">概览</a>
  <a data-page="devices">设备</a>
  <a data-page="challenges">认证记录</a>
  <div class="logout" onclick="doLogout()">退出</div>
</nav>

<div class="container" id="container">
<!-- ===== 概览 ===== -->
<div class="page active" id="page-dashboard">
  <div class="stats">
    <div class="stat-card"><div class="label">设备总数</div><div class="value" id="stat-devices">-</div></div>
    <div class="stat-card"><div class="label">已注册公钥</div><div class="value" id="stat-pubkeys">-</div></div>
    <div class="stat-card"><div class="label">今日挑战</div><div class="value" id="stat-today">-</div></div>
    <div class="stat-card"><div class="label">服务器状态</div><div class="value online" id="stat-status">在线</div></div>
  </div>
  <div class="section">
    <div class="section-header"><h2>最近认证</h2></div>
    <div id="recent-challenges"><div class="empty"><div class="icon">📋</div>暂无认证记录</div></div>
  </div>
</div>
<!-- ===== 设备 ===== -->
<div class="page" id="page-devices">
  <div class="section">
    <div class="section-header"><h2>设备列表</h2><button class="btn btn-primary btn-sm" onclick="showRegisterModal()">+ 注册设备</button></div>
    <div id="device-list"><div class="empty"><div class="icon">📱</div>暂无设备</div></div>
  </div>
</div>
<!-- ===== 认证记录 ===== -->
<div class="page" id="page-challenges">
  <div class="section">
    <div class="section-header"><h2>认证挑战记录</h2></div>
    <div id="challenge-list"><div class="empty"><div class="icon">🔐</div>暂无记录</div></div>
  </div>
</div>
</div>

<!-- ===== 注册弹窗 ===== -->
<div class="modal-overlay" id="register-modal">
  <div class="modal">
    <h3>注册新设备</h3>
    <div class="form-group"><label>设备 ID</label><input id="reg-deviceId" placeholder="例如: pass_key_001"></div>
    <div class="form-group"><label>设备名称（可选）</label><input id="reg-name" placeholder="例如: 我的PassKey"></div>
    <div class="form-actions">
      <button class="btn btn-sm" onclick="closeRegisterModal()" style="background:#eee;">取消</button>
      <button class="btn btn-sm btn-primary" onclick="registerDevice()">注册</button>
    </div>
    <div id="reg-result" style="margin-top:12px;padding:12px;background:#f0fdf4;border-radius:8px;display:none;font-size:13px;word-break:break-all;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let TOKEN = sessionStorage.getItem('admin_token');
let toastTimer;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== 登录 =====
function checkAuth() {
  if (TOKEN) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('nav-bar').style.display = 'flex';
    document.getElementById('container').classList.add('show');
    loadDashboard();
    setInterval(loadDashboard, 10000);
    return true;
  }
  return false;
}

async function doLogin() {
  const pwd = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  try {
    const res = await fetch(API + '/admin/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      TOKEN = data.token;
      sessionStorage.setItem('admin_token', TOKEN);
      err.style.display = 'none';
      checkAuth();
    } else {
      err.textContent = data.error || '密码错误';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = '网络错误: ' + e.message;
    err.style.display = 'block';
  }
}

function doLogout() {
  TOKEN = null;
  sessionStorage.removeItem('admin_token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('container').classList.remove('show');
  document.getElementById('login-password').value = '';
}

async function authFetch(url, options = {}) {
  const headers = { ...options.headers, 'Authorization': 'Bearer ' + TOKEN };
  const res = await fetch(url, { ...options, headers });
  if (res.status === 401) {
    doLogout();
    showToast('登录已过期，请重新登录');
    throw new Error('unauthorized');
  }
  return res;
}

// 导航
document.querySelectorAll('.nav a[data-page]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + a.dataset.page).classList.add('active');
    if (a.dataset.page === 'dashboard') loadDashboard();
    if (a.dataset.page === 'devices') loadDevices();
    if (a.dataset.page === 'challenges') loadChallenges();
  });
});

// ===== 概览 =====
async function loadDashboard() {
  try {
    const [statRes, chalRes] = await Promise.all([
      authFetch(API + '/admin/data/stats'),
      authFetch(API + '/admin/data/challenges?limit=10')
    ]);
    const stats = await statRes.json();
    const challenges = await chalRes.json();

    document.getElementById('stat-devices').textContent = stats.devices ?? '-';
    document.getElementById('stat-pubkeys').textContent = stats.pubkeys ?? '-';
    document.getElementById('stat-today').textContent = stats.todayChallenges ?? '-';

    const chals = challenges.challenges || [];
    const container = document.getElementById('recent-challenges');
    if (!chals.length) {
      container.innerHTML = '<div class="empty"><div class="icon">📋</div>暂无认证记录</div>';
    } else {
      container.innerHTML = '<table><thead><tr><th>请求ID</th><th>网站</th><th>设备</th><th>状态</th><th>时间</th></tr></thead><tbody>' +
        chals.slice(0, 10).map(c => `<tr>
          <td style="font-family:monospace;font-size:12px;">${(c.request_id||'').slice(0,12)}…</td>
          <td>${c.website||'-'}</td>
          <td>${c.device_id||'-'}</td>
          <td><span class="badge ${c.status||'pending'}">${c.status||'pending'}</span></td>
          <td style="color:#999;font-size:12px;">${formatTime(c.created_at)}</td>
        </tr>`).join('') + '</tbody></table>';
    }
  } catch (e) { if (e.message !== 'unauthorized') showToast('加载概览失败'); }
}

// ===== 设备 =====
async function loadDevices() {
  try {
    const res = await authFetch(API + '/admin/data/devices');
    const data = await res.json();
    const list = data.devices || [];
    const container = document.getElementById('device-list');
    if (!list.length) {
      container.innerHTML = '<div class="empty"><div class="icon">📱</div>暂无设备</div>';
    } else {
      container.innerHTML = '<table><thead><tr><th>设备ID</th><th>名称</th><th>公钥</th><th>注册时间</th></tr></thead><tbody>' +
        list.map(d => `<tr>
          <td style="font-family:monospace;font-size:13px;">${d.device_id||'-'}</td>
          <td>${d.name||'-'}</td>
          <td>${d.public_key ? '<span class="status-dot green"></span>已注册' : '<span class="status-dot gray"></span>未注册'}</td>
          <td style="color:#999;font-size:12px;">${formatTime(d.created_at)}</td>
        </tr>`).join('') + '</tbody></table>';
    }
  } catch (e) { if (e.message !== 'unauthorized') showToast('加载设备列表失败'); }
}

// ===== 认证记录 =====
async function loadChallenges() {
  try {
    const res = await authFetch(API + '/admin/data/challenges?limit=50');
    const data = await res.json();
    const list = data.challenges || [];
    const container = document.getElementById('challenge-list');
    if (!list.length) {
      container.innerHTML = '<div class="empty"><div class="icon">🔐</div>暂无记录</div>';
    } else {
      container.innerHTML = '<table><thead><tr><th>请求ID</th><th>设备</th><th>网站</th><th>来源</th><th>状态</th><th>创建时间</th></tr></thead><tbody>' +
        list.map(c => `<tr>
          <td style="font-family:monospace;font-size:12px;">${(c.request_id||'').slice(0,12)}…</td>
          <td style="font-family:monospace;font-size:13px;">${c.device_id||'-'}</td>
          <td>${c.website||'-'}</td>
          <td>${c.source||'-'}</td>
          <td><span class="badge ${c.status||'pending'}">${c.status||'pending'}</span></td>
          <td style="color:#999;font-size:12px;">${formatTime(c.created_at)}</td>
        </tr>`).join('') + '</tbody></table>';
    }
  } catch (e) { if (e.message !== 'unauthorized') showToast('加载认证记录失败'); }
}

// ===== 注册设备 =====
function showRegisterModal() { document.getElementById('register-modal').classList.add('show'); document.getElementById('reg-result').style.display = 'none'; }
function closeRegisterModal() { document.getElementById('register-modal').classList.remove('show'); }

async function registerDevice() {
  const deviceId = document.getElementById('reg-deviceId').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  if (!deviceId) { showToast('请输入设备ID'); return; }
  try {
    const res = await fetch(API + '/api/device/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ deviceId, name })
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('reg-result').style.display = 'block';
      document.getElementById('reg-result').innerHTML =
        '<strong>✅ 注册成功</strong><br><br>' +
        '<b>设备ID:</b> ' + data.deviceId + '<br>' +
        '<b>PSK 密钥:</b><br><code style="font-size:12px;word-break:break-all;background:#f5f5f5;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px;">' + data.psk + '</code><br><br>' +
        '<span style="color:#666;">请将此密钥填入设备 config.h 的 MQTT_PASSWORD</span>';
      loadDevices(); loadDashboard();
    } else {
      showToast('注册失败: ' + (data.error || '未知错误'));
    }
  } catch (e) { showToast('注册失败: ' + e.message); }
}

function formatTime(t) {
  if (!t) return '-';
  try { return new Date(t).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return t; }
}

// 初始化
checkAuth();
</script>
</body>
</html>
